<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.ico">
    <!-- Include sql.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Menghubungkan ke Database SQLio...</p>
    </div>

    <header>
        <h1>
            <i data-lucide="shield-alert"></i>
            SQLio
        </h1>
        <div id="case-progress" class="case-progress">Case -- / --</div>
    </header>

    <main>
        <section class="panel left-panel">
            <h2 id="case-title">Memuat...</h2>
            <p id="case-description" class="case-description">Silakan tunggu, mendownload file kasus...</p>
            <div id="case-instruction" class="case-instruction">...</div>
            <div class="clue-container" style="margin-bottom: 2rem;">
                <button id="toggle-clue-btn" style="background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 0.5rem 1rem; border: 1px solid var(--success); border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;"><i data-lucide="help-circle" style="width: 16px; height: 16px;"></i> Clue</button>
                <div id="case-clue" class="case-clue" style="display: none; background: rgba(16, 185, 129, 0.1); padding: 1rem; border-left: 4px solid var(--success); border-radius: 0 8px 8px 0; color: var(--text-main); font-size: 0.95rem; margin-top: 1rem;">
                    <strong>Clue:</strong> <span id="clue-text">...</span>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <div class="tabs-container" style="display: flex; gap: 0.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 0;">
                <button id="tab-btn-query" class="tab-btn active" style="background: rgba(255, 255, 255, 0.1); color: var(--text-main); border: none; padding: 0.75rem 1.5rem; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600;">Terminal Query</button>
                <button id="tab-btn-db" class="tab-btn" style="background: transparent; color: var(--text-muted); border: none; padding: 0.75rem 1.5rem; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600;">Database Explorer</button>
            </div>
            
            <div id="view-query" class="tab-content" style="display: flex; flex-direction: column; flex: 1; gap: 1.5rem;">
            <div class="editor-container">
                <div class="editor-header">
                    <span><i data-lucide="terminal" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle; margin-right: 5px;"></i> Terminal Query SQL</span>
                    <span>Tekan Ctrl + Enter untuk Eksekusi</span>
                </div>
                <textarea id="sql-editor" placeholder="Ketik query SELECT Anda di sini..."></textarea>
                <div class="actions">
                    <button id="run-btn">Run Query</button>
                </div>
            </div>

            <div class="results-container">
                <table id="results-table">
                    <thead id="results-head"></thead>
                    <tbody id="results-body"></tbody>
                </table>
                <div id="empty-state" class="empty-state">
                    Hasil query akan tampil di sini.
                </div>
            </div>
            </div>

            <div id="view-db" class="tab-content" style="display: none; flex-direction: column; flex: 1; background: rgba(0, 0, 0, 0.3); border-radius: 0 12px 12px 12px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem; overflow: auto;">
                <h3 style="color: var(--accent); margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 1rem;">Skema & Data</h3>
                <div id="db-explorer-content"></div>
            </div>
            
            <div id="feedback" class="feedback">
                <!-- Feedback message (success or error) goes here -->
            </div>
        </section>
    </main>

    <!-- Load scripts -->
    <script src="cases.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
